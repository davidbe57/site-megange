name: Deploy to AlwaysData

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy via SFTP
        env:
          LFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          lftp -u ${{ secrets.SFTP_USERNAME }},"$LFTP_PASSWORD" \
            -p 22 sftp://${{ secrets.SFTP_HOST }} \
            -e "set sftp:auto-confirm yes; \
            mirror -R --delete --verbose \
            --exclude .git/ --exclude .github/ \
            . ${{ secrets.SFTP_TARGET }}; quit"
